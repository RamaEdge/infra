apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: os-builder-runner-set
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: arc-runners
  chart:
    spec:
      chart: gha-runner-scale-set
      version: 0.13.1
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    runnerScaleSetName: os-builder-runner-set
    # GitHub configuration
    githubConfigUrl: "https://github.com/ramaedge"
    # Reference to pre-existing secret in arc-runners namespace
    # Secret must have key: github_token
    githubConfigSecret: arc-runner-set-secret

    # Auto-scaling configuration — fewer runners, these are heavy builds
    minRunners: 0
    maxRunners: 3

    # Listener pod template (proxy that polls GitHub API for jobs and
    # spawns runners). The listener image is the same distroless controller
    # image, which runs as nonroot via its USER directive; we add the
    # caps/seccomp/allowPrivEsc fields needed for restricted PSS.
    listenerTemplate:
      spec:
        securityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        containers:
          - name: listener
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
              runAsNonRoot: true
            # Listener is a small Go binary that polls the GitHub API.
            # 25m/64Mi is enough idle; bursts to ~50m/100Mi when starting
            # runner pods. Cap at 100m/128Mi so a runaway can't starve
            # neighbors.
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi

    # Runner pod template
    template:
      spec:
        nodeSelector:
          node-role.runners: "true"
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: os-builder-runner-set
        securityContext:
          fsGroup: 1001
        containers:
          - name: runner
            image: harbor.theedgeworks.ai/base/actions-runner:v0.5.1
            command: ["/home/runner/run.sh"]
            # Higher resources — bootc image builds with embedded container
            # images are CPU and memory intensive (skopeo pulls ~30 images
            # during podman build, podman compresses layers)
            resources:
              requests:
                cpu: "500m"
                memory: "1Gi"
              limits:
                cpu: "4"
                memory: "8Gi"
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work

        # Large ephemeral storage — embed-microshift-images.sh pulls ~30
        # container images into the build layer during podman build.
        # The standard 5Gi workspace is insufficient for bootc builds.
        volumes:
          - name: work
            ephemeral:
              volumeClaimTemplate:
                spec:
                  accessModes:
                    - ReadWriteOnce
                  storageClassName: longhorn
                  resources:
                    requests:
                      storage: 40Gi
