apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: harbor
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: longhorn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: harbor
spec:
  replicas: 1
  # PVC is ReadWriteOnce, so a RollingUpdate cannot start a new pod until the
  # old one releases the volume — and the old one won't terminate until the
  # new one is Ready. That deadlocks any template change. Recreate kills the
  # old pod first (~10s redis unavailability per update; harbor retries).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      nodeSelector:
        node-role.apps: "true"
      securityContext:
        runAsNonRoot: true
        # Image redis:8-alpine: uid=999(redis) gid=1000(redis). Matching
        # runAsGroup avoids gid=999 surfacing as `ping` in the running pod.
        runAsUser: 999
        runAsGroup: 1000
        fsGroup: 1000
        # Skip recursive chown on every restart once /data root is correctly
        # owned. First rollout after this change does a one-time chown
        # 999→1000 on the existing PVC; subsequent restarts are fast.
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: redis
        image: redis:8-alpine
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        resources:
          requests:
            memory: 64Mi
            cpu: 25m
          limits:
            memory: 128Mi
            cpu: 100m
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: harbor
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379