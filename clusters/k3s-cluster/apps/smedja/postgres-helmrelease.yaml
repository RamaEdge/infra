apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: smedja-db
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: smedja
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: postgresql
      version: 18.1.13
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    fullnameOverride: smedja-postgresql
    global:
      postgresql:
        auth:
          username: smedja
          database: smedja
          existingSecret: smedja-db-credentials
          secretKeys:
            adminPasswordKey: postgres-password
            userPasswordKey: password
    primary:
      persistence:
        enabled: true
        storageClass: longhorn-replicated
        size: 10Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
