apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "80.6.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # Storage Configuration for Longhorn
    prometheus:
      prometheusSpec:
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 500Gi
        # Retention configuration
        retention: 10d
        retentionSize: 450GB
        # Scrape ServiceMonitors from all namespaces
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorNamespaceSelector: {}
        podMonitorNamespaceSelector: {}
        ruleNamespaceSelector: {}

    grafana:
      # Use Recreate strategy for RWO volumes to avoid multi-attach errors
      deploymentStrategy:
        type: Recreate
      persistence:
        enabled: true
        storageClassName: longhorn
        accessModes: ["ReadWriteOnce"]
        size: 2Gi

      # Skip the init-chown-data init container — it runs as UID 0 with
      # cap_chown to fix volume permissions, which violates restricted PSS.
      # The pod-level fsGroup:472 already ensures kubelet recursively
      # chowns the PVC to GID 472 on mount, so the init is redundant.
      initChownData:
        enabled: false
      # Ensure admin password is set or use default (prom-operator)
      adminPassword: "prom-operator"

      # Load Keycloak OIDC credentials and SMTP password from secrets
      envFromSecrets:
        - name: keycloak-oidc
        - name: grafana-smtp

      grafana.ini:
        server:
          domain: monitor.theedgeworks.ai
          root_url: https://monitor.theedgeworks.ai
          enable_gzip: true
        auth:
          disable_login_form: true
          oauth_allow_insecure_email_lookup: true
        auth.basic:
          enabled: false
        auth.generic_oauth:
          enabled: true
          name: Keycloak
          allow_sign_up: true
          client_id: theedgeworks
          scopes: openid profile email
          use_pkce: true
          auth_url: https://auth.theedgeworks.ai/realms/theedgeworks/protocol/openid-connect/auth
          token_url: https://auth.theedgeworks.ai/realms/theedgeworks/protocol/openid-connect/token
          api_url: https://auth.theedgeworks.ai/realms/theedgeworks/protocol/openid-connect/userinfo
          signout_redirect_url: https://auth.theedgeworks.ai/realms/theedgeworks/protocol/openid-connect/logout?post_logout_redirect_uri=https%3A%2F%2Fmonitor.theedgeworks.ai%2Flogin
          # Attribute mappings for Keycloak
          email_attribute_path: email
          login_attribute_path: email
          name_attribute_path: name
          groups_attribute_path: groups
          role_attribute_path: contains(groups[*], 'grafana-admin') && 'Admin' || 'Viewer'
        # SMTP via Google Workspace SMTP Relay
        # Password is loaded from the grafana-smtp secret (GF_SMTP_PASSWORD)
        smtp:
          enabled: true
          host: smtp-relay.gmail.com:587
          user: ravichillerega@theedgeworks.ai
          from_address: alerts@theedgeworks.ai
          from_name: Grafana Alerts
          startTLS_policy: MandatoryStartTLS
          skip_verify: false

      # Loki datasource for log aggregation
      additionalDataSources:
        - name: Loki
          type: loki
          uid: loki
          access: proxy
          url: http://loki.monitoring.svc.cluster.local:3100
          jsonData:
            maxLines: 1000

      # Default unified alerting contact point and routing policy.
      # Provisioned so a fresh install always has a working alert path.
      alerting:
        contactpoints.yaml:
          apiVersion: 1
          contactPoints:
            - orgId: 1
              name: email-default
              receivers:
                - uid: email-default-1
                  type: email
                  settings:
                    addresses: chillerege.ravi@gmail.com
                    singleEmail: false
        policies.yaml:
          apiVersion: 1
          policies:
            - orgId: 1
              receiver: email-default
              group_by: ["grafana_folder", "alertname"]
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h

      ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
        hosts:
          - monitor.theedgeworks.ai
        path: /
        tls:
          - secretName: monitor-tls
            hosts:
              - monitor.theedgeworks.ai

    # ARM64 Compatibility
    # Most default images in this chart are multi-arch.
    # If specific components fail, we may need to override images here.

    # Disable Prometheus default rules that don't apply to k3s.
    # k3s bundles the controller-manager, scheduler, and kube-proxy into a
    # single server binary, so the standard scrape-based rules report them
    # "down" because there are no separate endpoints to scrape.
    defaultRules:
      create: true
      rules:
        kubeControllerManager: false
        kubeProxy: false
        kubeSchedulerAlerting: false
      disabled:
        Watchdog: true
        InfoInhibitor: true

    # Stricter node availability alerts than the kube-prometheus defaults
    # (which wait 15m). Nodes should not be down - we want to know fast.
    additionalPrometheusRulesMap:
      node-availability:
        groups:
          - name: node.availability
            rules:
              - alert: NodeDown
                expr: up{job="node-exporter"} == 0
                for: 2m
                labels:
                  severity: critical
                annotations:
                  summary: "Node {{ $labels.instance }} is unreachable"
                  description: "node_exporter on {{ $labels.instance }} has been unscrapeable for 2 minutes. Node may be down, kubelet stopped, or networking broken."
              - alert: NodeRebooted
                expr: changes(node_boot_time_seconds[10m]) > 0
                for: 1m
                labels:
                  severity: warning
                annotations:
                  summary: "Node {{ $labels.instance }} rebooted"
                  description: "Node {{ $labels.instance }} rebooted within the last 10 minutes. If unplanned, investigate."

    # Alertmanager: SMTP via Google Workspace relay, grouping to avoid
    # duplicate-alert spam, severity-based routing, and inhibition rules
    # so critical alerts suppress the matching warning alerts.
    alertmanager:
      alertmanagerSpec:
        # Mount the existing grafana-smtp secret so the SMTP password is
        # available at /etc/alertmanager/secrets/grafana-smtp/GF_SMTP_PASSWORD
        secrets:
          - grafana-smtp
        resources:
          limits:
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
      config:
        global:
          resolve_timeout: 5m
          smtp_from: alerts@theedgeworks.ai
          smtp_smarthost: smtp-relay.gmail.com:587
          smtp_auth_username: ravichillerega@theedgeworks.ai
          smtp_auth_password_file: /etc/alertmanager/secrets/grafana-smtp/GF_SMTP_PASSWORD
          smtp_require_tls: true
          smtp_hello: theedgeworks.ai
        route:
          receiver: email-default
          group_by: ["alertname", "severity"]
          group_wait: 30s
          group_interval: 10m
          repeat_interval: 4h
          routes:
            - matchers:
                - severity = "critical"
              receiver: email-default
              repeat_interval: 1h
            - matchers:
                - alertname = "Watchdog"
              receiver: "null"
        receivers:
          - name: "null"
          - name: email-default
            email_configs:
              - to: chillerege.ravi@gmail.com
                send_resolved: true
                headers:
                  Subject: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }} ({{ .CommonLabels.severity }})'
                html: |
                  <h3>{{ .CommonLabels.alertname }} <small>({{ .CommonLabels.severity }})</small></h3>
                  <p><strong>Status:</strong> {{ .Status }} &middot;
                     <strong>Firing:</strong> {{ .Alerts.Firing | len }} &middot;
                     <strong>Resolved:</strong> {{ .Alerts.Resolved | len }}</p>
                  <p>
                    <a href="https://monitor.theedgeworks.ai/alerting/groups?dataSource=Alertmanager&queryString=alertname%3D{{ .CommonLabels.alertname }}">View firing instance &rarr; Alertmanager</a>
                    &nbsp;|&nbsp;
                    <a href="https://monitor.theedgeworks.ai/alerting/list?search=alertname%3D{{ .CommonLabels.alertname }}">Alert rule</a>
                    &nbsp;|&nbsp;
                    <a href="https://monitor.theedgeworks.ai/explore?left=%7B%22datasource%22%3A%22prometheus%22%2C%22range%22%3A%7B%22from%22%3A%22now-1h%22%2C%22to%22%3A%22now%22%7D%7D">Prometheus Explore</a>
                    &nbsp;|&nbsp;
                    <a href="https://monitor.theedgeworks.ai/explore?left=%7B%22datasource%22%3A%22loki%22%2C%22queries%22%3A%5B%7B%22refId%22%3A%22A%22%2C%22expr%22%3A%22%7Bnamespace%3D%5C%22{{ .CommonLabels.namespace }}%5C%22%7D%22%7D%5D%2C%22range%22%3A%7B%22from%22%3A%22now-1h%22%2C%22to%22%3A%22now%22%7D%7D">Loki logs (namespace)</a>
                  </p>
                  {{ range .Alerts }}
                  <hr>
                  <p><strong>{{ .Annotations.summary }}</strong></p>
                  <p>{{ .Annotations.description }}</p>
                  <p>
                    {{ with .Labels.instance }}<strong>Instance:</strong> {{ . }}<br>{{ end }}
                    {{ with .Labels.namespace }}<strong>Namespace:</strong> {{ . }}<br>{{ end }}
                    {{ with .Labels.pod }}<strong>Pod:</strong> {{ . }}<br>{{ end }}
                    <strong>Started:</strong> {{ .StartsAt.Format "2006-01-02 15:04:05 MST" }}
                  </p>
                  {{ end }}
        inhibit_rules:
          # Critical of the same alert+namespace suppresses warning/info
          - source_matchers:
              - severity = "critical"
            target_matchers:
              - severity =~ "warning|info"
            equal: ["alertname", "namespace"]
          # NodeDown suppresses every other alert from the same instance
          # (when the node is gone, downstream pod alerts are noise)
          - source_matchers:
              - alertname = "NodeDown"
            target_matchers:
              - severity =~ "warning|info|critical"
            equal: ["instance"]

    # Resource limits can be tuned for RPi
    prometheusOperator:
      resources:
        limits:
          memory: 200Mi
        requests:
          cpu: 100m
          memory: 100Mi
