apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: forgejo
  dependsOn:
    - name: forgejo-db
      namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: forgejo
      version: "16.1.0"
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: flux-system
  values:
    nodeSelector:
      node-role.apps: "true"

    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: forgejo

    persistence:
      enabled: true
      storageClass: longhorn
      size: 200Gi

    ingress:
      enabled: true
      className: nginx
      annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        nginx.ingress.kubernetes.io/proxy-body-size: "11g"
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
        nginx.ingress.kubernetes.io/limit-connections: "10"
        nginx.ingress.kubernetes.io/limit-rps: "20"
      hosts:
        - host: code.theedgeworks.ai
          paths:
            - path: /
              pathType: Prefix
              port: http
      tls:
        - secretName: forgejo-tls
          hosts:
            - code.theedgeworks.ai

    gitea:
      admin:
        existingSecret: forgejo-admin-secret

      config:
        database:
          DB_TYPE: postgres
          HOST: forgejo-postgresql.forgejo.svc.cluster.local
          PORT: "5432"
          NAME: forgejo
          USER: forgejo
        server:
          ROOT_URL: https://code.theedgeworks.ai
          DOMAIN: code.theedgeworks.ai
          SSH_DOMAIN: code.theedgeworks.ai
          LFS_START_SERVER: "true"
        lfs:
          STORAGE_TYPE: local
          MAX_FILE_SIZE: "10737418240"
        attachment:
          MAX_SIZE: "10240"
          MAX_FILES: "10"
        repository:
          MAX_CREATION_LIMIT: "-1"
        packages:
          ENABLED: "true"
          MAX_SIZE_RPM: "10737418240"

      additionalConfigFromEnvs:
        - name: FORGEJO__DATABASE__PASSWD
          valueFrom:
            secretKeyRef:
              name: forgejo-db-credentials
              key: password

      oauth:
        - name: Keycloak
          provider: openidConnect
          autoDiscoverUrl: https://auth.theedgeworks.ai/realms/theedgeworks/.well-known/openid-configuration
          existingSecret: forgejo-oidc-secret

    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
